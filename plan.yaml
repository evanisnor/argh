        2. GitHub API: who reviewed similar PRs recently.
        3. GitHub API: CODEOWNERS rules for changed files.
      Combine signals into a ranked list, de-duplicate. User selects from the
      list before the request is sent.
    references:
      - "VISION.md § 9.2 Smart Review Assignment"

  - id: 35
    title: Per-repo configuration (.argh.yaml)
    status: pending
    depends_on: [3]
    description: >
      When argh is run inside a git repo (or when a PR action targets a repo),
      look for .argh.yaml in the repo root (fetched via GitHub API, not local fs).
      If found, parse and apply overrides:
        - default_reviewers: list of logins
        - label_conventions: map of shorthand → full label name
        - merge_strategy: squash | merge | rebase
      Repo-level config takes precedence over global config for the relevant repo.
    references:
      - "VISION.md § 9.4 Per-Repo Configuration"

