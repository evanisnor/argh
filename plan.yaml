---
# argh — Implementation Plan
# Generated from VISION.md and ARCHITECTURE.md
# Last updated: 2026-03-19

# ─── Testing Policy ──────────────────────────────────────────────────────────
# All code must be unit tested with 100% branch and line coverage.
# Tests are written alongside the implementation as part of each task.
# Each task includes a `testing` field describing the key scenarios to cover.
# Use table-driven tests where multiple input variants exist.
# Mock external boundaries (GitHub API, filesystem, OS notifications) with
# interfaces; test internal logic against fakes or in-memory implementations.

tasks:

  # ─── Phase 1: Project Foundation ────────────────────────────────────────────

  - id: 1
    title: Initialize Go module and directory structure
    status: pending
    depends_on: []
    description: >
      Run `go mod init github.com/evanisnor/argh` targeting Go 1.22+. Create the
      canonical directory layout from ARCHITECTURE.md:
        cmd/argh/main.go
        internal/api/
        internal/ui/
        internal/watches/
        internal/notify/
        internal/config/
        internal/persistence/
        internal/diff/
      Add a stub main.go that prints the version and exits cleanly.
      Add a Brewfile at the repo root.
    references:
      - "ARCHITECTURE.md § Directory Structure"
      - "ARCHITECTURE.md § Technology Stack"
    testing: >
      Verify the module compiles and the stub binary exits with code 0.

  - id: 2
    title: macOS-only runtime guard
    status: pending
    depends_on: [1]
    description: >
      At startup, check `runtime.GOOS == "darwin"`. If not, print an informative
      error ("argh v1 is macOS only") and exit with a non-zero status code.
      This is a hard non-goal for v1 per the PRD.
    references:
      - "VISION.md § 1 Non-Goals — Windows or Linux support"
    testing: >
      Table-driven: GOOS=darwin → no error; GOOS=linux → error + non-zero exit.
      Inject GOOS as a parameter rather than reading runtime.GOOS directly so
      the guard is testable without cross-compilation.

  - id: 3
    title: Config loading (internal/config)
    status: pending
    depends_on: [1]
    description: >
      Implement config loading from ~/.config/argh/config.yaml using
      gopkg.in/yaml.v3. Provide sane defaults for all fields. Config struct
      should cover:
        - poll_interval (default 10s)
        - notifications: ci_pass, ci_fail, approved, changes_requested,
          review_requested, merged, watch_triggered (all bool)
        - do_not_disturb.schedule (list of windows with days/from/to/all_day)
        - sleep_schedule.poll_interval (default 5m) and windows (same shape)
      Create the config directory (~/.config/argh/) on first run if absent.
      Expose a global Config singleton loaded once at startup.
    references:
      - "VISION.md § 7 Notification System — configurable per-event yaml"
      - "VISION.md § 9.6 Do Not Disturb Mode — scheduled DND yaml"
      - "VISION.md § 9.7 Sleep Schedule — yaml config"
      - "ARCHITECTURE.md § Technology Stack — Config: YAML via gopkg.in/yaml.v3"
    testing: >
      - Missing file → all defaults applied.
      - Partial file → specified fields overridden, rest use defaults.
      - Full valid file → all fields parsed correctly.
      - Malformed YAML → clear error returned.
      - Config dir created if absent (use temp dir in tests).

  # ─── Phase 2: Persistence / Cache Layer ─────────────────────────────────────

  - id: 4
    title: SQLite schema and persistence layer (internal/persistence)
    status: pending
    depends_on: [1]
    description: >
      Set up mattn/go-sqlite3. Design and migrate the schema covering:
        - pull_requests: id, repo, number, title, status, ci_state, draft,
          author, created_at, updated_at, last_activity_at, url, global_id
        - reviewers: pr_id, login, state (APPROVED, CHANGES_REQUESTED,
          PENDING, COMMENTED)
        - check_runs: pr_id, name, state, conclusion, url
        - review_threads: pr_id, id, resolved, body, path, line
        - timeline_events: pr_id, event_type, actor, created_at, payload_json
        - watches: id, pr_url, pr_number, repo, trigger_expr, action_expr,
          status (waiting, scheduled, fired, failed), created_at, fired_at
        - session_ids: pr_url, session_id  (reset on restart)
        - rate_limit: singleton row tracking remaining/reset values
        - etags: url, etag, last_modified  (for conditional REST requests)
      Use WAL mode for concurrent reads. Expose typed read/write methods.
      Store database at ~/.local/share/argh/argh.db; create directory on first run.
    references:
      - "ARCHITECTURE.md § High-Level Architecture — DB: SQLite reactive cache"
      - "ARCHITECTURE.md § Data Flow Principles"
      - "VISION.md § 9.1 PR Status Bar Overlay — reads from local SQLite"
    testing: >
      Use an in-memory SQLite DB (:memory:) for all tests.
      - Round-trip write/read for every table.
      - Update existing rows: verify only changed fields update.
      - Schema migration runs cleanly on a fresh DB.
      - WAL mode is enabled after open.
      - Data directory is created when absent.

  - id: 5
    title: Reactive event bus (DB → subscribers)
    status: pending
    depends_on: [4]
    description: >
      Implement a lightweight in-process publish/subscribe event bus that the
      persistence layer fires whenever a row changes. Events should carry:
        - event type (PR_UPDATED, CI_CHANGED, REVIEW_CHANGED, WATCH_FIRED, etc.)
        - before and after snapshots of the changed row
      The UI model and Watch Engine both subscribe to this bus. Use Go channels
      or a callback registry. This is the mechanism that makes UI reactive without
      the UI polling the database.
    references:
      - "ARCHITECTURE.md § Data Flow Principles — DB emits events to UI and Watch"
    testing: >
      - Subscribe → publish → subscriber receives event with correct before/after.
      - Multiple subscribers all receive the same event.
      - Unsubscribe → subsequent publishes not delivered.
      - No goroutine leak after bus shutdown.

  # ─── Phase 3: GitHub API Client ─────────────────────────────────────────────

  - id: 6
    title: GitHub authentication via gh CLI (internal/api)
    status: pending
    depends_on: [1]
    description: >
      Shell out to `gh auth token` to retrieve the current authenticated user's
      token. Fail fast with a clear error if `gh` is not installed or not
      authenticated. Store token in memory for the lifetime of the process.
      Also fetch the authenticated user's login (`gh api user --jq .login`)
      for use in search queries.
    references:
      - "ARCHITECTURE.md § GitHub API Strategy — Authentication: gh auth token"
    testing: >
      Inject a command executor interface so tests can fake `gh` output.
      - gh returns token → token stored, login fetched.
      - gh not found → clear error.
      - gh not authenticated (non-zero exit) → clear error.
      - gh returns empty token → clear error.

  - id: 7
    title: GraphQL client — fetch My Pull Requests
    status: pending
    depends_on: [6, 4]
    description: >
      Use shurcooL/githubv4 to query `search(query: "is:pr is:open author:@me")`
      for all open PRs authored by the current user across all repos. For each PR
      fetch: repo, number, title, state, isDraft, createdAt, updatedAt,
      reviewRequests (requestedReviewers), reviews (nodes: author, state),
      checkSuites → checkRuns (name, status, conclusion), url, id, comments count,
      mergeQueueEntry (to detect merge queued status).
      Write results into the persistence layer. Track last-seen state to detect
      changes and emit events.
    references:
      - "VISION.md § 3.1 My Pull Requests Panel — columns"
      - "ARCHITECTURE.md § GitHub API Strategy — GraphQL Search, GraphQL Query"
    testing: >
      Mock the GraphQL client interface.
      - Successful response → all fields written to DB correctly.
      - New PR appears → PR_UPDATED event emitted.
      - Existing PR changes CI state → CI_CHANGED event emitted.
      - No changes → no events emitted.
      - API error → error returned, DB unchanged.

  - id: 8
    title: GraphQL client — fetch Review Queue
    status: pending
    depends_on: [6, 4]
    description: >
      Query `search(query: "is:pr is:open review-requested:@me")` to find PRs
      where the current user is a requested reviewer. Same nested fields as
      task 7. Write into persistence layer. Include author login and per-PR
      timeline events for urgency calculation (last activity timestamp,
      author wait time).
    references:
      - "VISION.md § 3.2 Review Queue Panel — columns and urgency formula"
      - "ARCHITECTURE.md § GitHub API Strategy — GraphQL Search"
    testing: >
      Same mock strategy as task 7.
      - Author wait time correctly derived from timeline events.
      - PRs already in DB from task 7 (authored by self + review requested) are
        not duplicated — each panel reads from its own query result set.

  - id: 9
    title: REST mutations — PR actions
    status: pending
    depends_on: [6]
    description: >
      Implement REST action methods via google/go-github for all write operations:
        - approve(repo, number)          → POST /pulls/{number}/reviews
        - requestReview(repo, number, users)
        - postComment(repo, number, body)
        - addLabel / removeLabel
        - mergePR(repo, number, method)  → PUT /pulls/{number}/merge
        - closePR / reopenPR
        - markReadyForReview             → GraphQL mutation (no REST equivalent)
        - convertToDraft                 → GraphQL mutation (no REST equivalent)
        - resolveReviewThread(threadID)  → GraphQL mutation (no REST equivalent)
      Every mutation appends a line to the audit log (task 24).
    references:
      - "VISION.md § 3.6 Interactive Commands"
      - "VISION.md § 9.3 Inline Comment Thread Browser — mark resolved"
      - "ARCHITECTURE.md § GitHub API Strategy — REST API: mutations"
    testing: >
      Mock the REST and GraphQL clients via interfaces.
      - Each mutation calls the correct endpoint with correct parameters.
      - Successful mutation → audit log entry appended.
      - API error → error returned, audit log not written.

  - id: 10
    title: Rate limit tracking and adaptive back-off
    status: pending
    depends_on: [7, 8]
    description: >
      On every API response, read x-ratelimit-remaining and x-ratelimit-reset
      headers. Persist values to the rate_limit singleton row in SQLite. Apply
      adaptive back-off logic:
        remaining > 1000  → poll at configured interval
        500–999           → 2× interval
        100–499           → 5× interval
        < 100             → pause polling, emit warning event for status bar
      Expose current rate limit state for the status bar display
      ("API ●●●○ 3,847/5,000").
    references:
      - "ARCHITECTURE.md § Polling & Rate Limits — Adaptive Back-Off"
    testing: >
      Table-driven over all four remaining thresholds (>1000, 500-999, 100-499, <100).
      - Each threshold produces the correct interval multiplier.
      - <100 emits a warning event.
      - Values are persisted to the rate_limit row after each response.

  - id: 11
    title: ETag / conditional request caching for REST endpoints
    status: pending
    depends_on: [9]
    description: >
      For REST endpoints used in polling (PR details, check runs), store the
      ETag and Last-Modified response headers in the etags table in SQLite.
      On subsequent requests send If-None-Match / If-Modified-Since headers.
      A 304 response skips writing to the DB and costs 0 primary-limit points.
    references:
      - "ARCHITECTURE.md § Polling & Rate Limits — REST Conditional Requests"
    testing: >
      - First request: no ETag sent, response ETag stored.
      - Second request: ETag header sent; 304 response → DB not written.
      - 200 response with new ETag → DB written, ETag updated.

  # ─── Phase 4: Poll Ticker & Sleep Schedule ───────────────────────────────────

  - id: 12
    title: Poll ticker goroutine
    status: pending
    depends_on: [7, 8, 10]
    description: >
      Start a goroutine that fires the GraphQL fetch (tasks 7 & 8) on a
      configurable ticker defaulting to 10s. The ticker interval is dynamically
      adjusted by the rate-limit back-off logic (task 10) and the sleep schedule
      (task 13). Expose a channel to force an immediate poll (used by :reload).
      Gracefully shut down on process exit.
    references:
      - "ARCHITECTURE.md § High-Level Architecture — Poll Ticker"
      - "ARCHITECTURE.md § Chosen Poll Interval: 10 seconds"
    testing: >
      Use a fake clock / injectable ticker.
      - Ticker fires → fetch functions called.
      - Force-poll channel → immediate fetch without waiting for tick.
      - Shutdown signal → goroutine exits cleanly, no leak.
      - Interval changes mid-run (rate-limit back-off) → next tick uses new interval.

  - id: 13
    title: Sleep schedule — reduced polling during off-hours
    status: pending
    depends_on: [3, 12]
    description: >
      Read sleep_schedule config (windows + poll_interval). Before each tick,
      check whether the current time falls inside a sleep window. If so, use
      the sleep poll_interval instead of the normal one. Status bar shows
      "💤 sleeping (next poll in Xm)" during sleep windows. Implement :wake
      command to immediately resume normal polling regardless of schedule.
    references:
      - "VISION.md § 9.7 Sleep Schedule"
    testing: >
      Inject a clock interface for time.Now().
      Table-driven over: inside window, outside window, boundary (start/end of window),
      all_day window, multi-day window spanning midnight.
      - Inside window → sleep interval used.
      - Outside window → normal interval used.
      - :wake → normal interval restored immediately regardless of window.

  # ─── Phase 5: TUI Foundation ─────────────────────────────────────────────────

  - id: 14
    title: Bubble Tea root model and layout (internal/ui/model.go)
    status: pending
    depends_on: [5]
    description: >
      Initialize the Bubble Tea program. Root model holds references to all
      sub-models (panels, command bar, detail pane). Implement the top-level
      Update() dispatching messages to the correct sub-model. Implement View()
      composing the full terminal layout using lipgloss:
        - Header bar (app name, version, username, global status)
        - My Pull Requests panel
        - Review Queue panel
        - Watches panel (hidden when empty)
        - Detail pane (collapsible, side or bottom)
        - Command bar (pinned to bottom)
      Use lipgloss.HasDarkBackground() for automatic theme selection.
      Subscribe to the event bus (task 5) and translate DB events into
      Bubble Tea commands/messages.
    references:
      - "VISION.md § 4 Wireframe Layout"
      - "ARCHITECTURE.md § UI & Theming"
      - "ARCHITECTURE.md § Directory Structure — ui/model.go"
    testing: >
      Use bubbletea/teatest or drive Update() directly with synthetic messages.
      - DB event → correct Bubble Tea message dispatched to correct sub-model.
      - View() output contains all expected panel regions.
      - Watches panel absent from View() when no watches exist.
      - Detail pane absent from View() when collapsed.

  - id: 15
    title: Global keyboard navigation
    status: pending
    depends_on: [14]
    description: >
      Handle global key bindings in the root Update():
        j/↓       move focus down within focused panel
        k/↑       move focus up
        Tab       cycle between panels (My PRs → Review Queue → Watches)
        Enter     expand detail pane for focused PR
        /  or :   focus command bar
        Esc       dismiss overlay or unfocus command bar
        o         open focused PR in browser
        d         show diff for focused PR
        a         approve focused PR (when in Review Queue)
        r         open reviewer picker for focused PR
        ?         toggle help overlay
        q         quit
        R         force reload (:reload)
        D         toggle Do Not Disturb
        p         toggle detail pane
    references:
      - "VISION.md § 5 Interaction Model — Keyboard Navigation"
    testing: >
      Table-driven over every key binding.
      - Each key produces the correct model state change or command.
      - `a` (approve) only fires when focus is in Review Queue, not My PRs.
      - Esc dismisses overlay when one is open; unfocuses command bar otherwise.

  # ─── Phase 6: Panels ─────────────────────────────────────────────────────────

  - id: 16
    title: Local session ID assignment
    status: pending
    depends_on: [4, 14]
    description: >
      At startup and on each reload, assign alphabetic session IDs (a, b, c …
      z, aa, ab …) to every PR visible in My PRs and Review Queue, in display
      order. Store mapping in the session_ids table (keyed by PR URL for
      stability). Clear and reassign on :reload. IDs are used as fast command
      bar references and displayed as the first column in both panels.
    references:
      - "VISION.md § 3.1 My Pull Requests — id column"
      - "VISION.md § 5 Local Session IDs"
    testing: >
      - 1 PR → id "a"; 26 PRs → ids "a"–"z"; 27 PRs → "a"–"z", "aa".
      - Reload clears old IDs and reassigns from scratch.
      - PR URL key is stable across reloads (same URL → same ID if order unchanged).
      - session_ids table is cleared on restart.

  - id: 17
    title: My Pull Requests panel (internal/ui/panel_prs.go)
    status: pending
    depends_on: [14, 16]
    description: >
      Render the My Pull Requests panel. Read PR rows from the DB. Columns:
        id · 👁 · Repo · # · Title · Status · CI · Reviews · Comments · Age
      Behaviors:
        - Sort by staleness (longest idle time first).
        - Highlight rows with failing CI or blocking reviews.
        - Draft PRs dimmed / prefixed with [draft].
        - Flash animation on any field change (via event bus message).
        - Show 👁 icon when PR has one or more active watches.
        - Show badge count "[N open]" in panel header.
      Status values: draft, open, approved, changes requested, merge queued.
      CI values: ✓ passing, ✗ failing, ⟳ running, — none.
    references:
      - "VISION.md § 3.1 My Pull Requests Panel"
      - "ARCHITECTURE.md § Directory Structure — ui/panel_prs.go"
    testing: >
      - Sorting: PRs with older last_activity_at appear first.
      - Draft PRs rendered with [draft] prefix and dimmed style.
      - Failing CI row has highlight style applied.
      - 👁 icon present when watches exist, absent when none.
      - Badge count matches number of rows.
      - All five status values render correctly.
      - All four CI states render correct symbol.

  - id: 18
    title: Review Queue panel (internal/ui/panel_reviews.go)
    status: pending
    depends_on: [14, 16]
    description: >
      Render the Review Queue panel. Read from DB. Columns:
        id · 👁 · Repo · # · Title · Author · CI · Age · Urgency
      Urgency formula (clamped to 1–3):
        Base: <4h → 1, 4–24h → 2, >24h → 3
        CI modifier: failing +1, passing -1, running/none ±0
        Author wait >72h: +1
      Urgency display: ●●● (3), ●●○ (2), ●○○ (1).
      Sort by urgency descending.
      Highlight PRs where user is the last required reviewer.
      Highlight "ready to review" (CI passing, no blockers).
      Show badge count "[N waiting]" in panel header.
    references:
      - "VISION.md § 3.2 Review Queue Panel"
      - "ARCHITECTURE.md § Directory Structure — ui/panel_reviews.go"
    testing: >
      Table-driven urgency formula covering all combinations:
        staleness × CI state × author wait → expected score (clamped 1–3).
      At minimum: base=1+ci_fail+author_wait → clamped to 3 (not 4).
                  base=3+ci_pass → 2 (not 1, since clamped ≥1).
      - Sorted by urgency descending.
      - Last-required-reviewer highlight applied correctly.
      - Ready-to-review highlight (CI passing, no blockers).

  - id: 19
    title: Watches panel (internal/ui/panel_watches.go)
    status: pending
    depends_on: [14]
    description: >
      Render the Watches panel as the always-visible third panel. Read watch
      rows from the DB. Columns:
        id · Repo · # · Trigger · Action · Status
      Status values: ⟳ waiting, ⟳ scheduled, ✓ fired, ✗ failed.
      Behaviors:
        - Rows flash briefly when a watch fires.
        - Completed/failed watches remain visible briefly then fade out.
        - Panel is hidden (collapsed) when there are no active watches.
        - Show badge count "[N active]" in panel header.
    references:
      - "VISION.md § 3.4 Watches Panel"
      - "ARCHITECTURE.md § Directory Structure — ui/panel_watches.go"
    testing: >
      - No watches → panel collapsed (not present in View output).
      - Each status value renders correct symbol.
      - WATCH_FIRED event → flash animation triggered on correct row.
      - Badge count reflects active (non-fired, non-failed) watches.

  - id: 20
    title: Detail / Preview pane (internal/ui/panel_detail.go)
    status: pending
    depends_on: [14]
    description: >
      Collapsible side or bottom pane for the focused PR. Toggled with Enter
      or `p`. Contains:
        - Full PR description rendered via Glamour (markdown).
        - Check runs list (individual CI job names + states).
        - Review thread summary (open vs resolved count).
        - Active watches for this PR.
        - Recent timeline events (commits, reviews, labels).
      Inline thread navigation: n/N cycles through open review threads.
      Implement "mark resolved" action on a thread (calls resolveReviewThread
      GraphQL mutation via task 9) without opening browser.
      Use Bubbles viewport component for scrollable content.
    references:
      - "VISION.md § 3.3 Detail / Preview Pane"
      - "VISION.md § 9.3 Inline Comment Thread Browser"
      - "ARCHITECTURE.md § Technology Stack — Markdown: Glamour"
    testing: >
      - Collapsed by default; Enter/p toggles open.
      - PR description rendered as markdown (Glamour output non-empty).
      - n/N navigation cycles through open threads only (resolved excluded).
      - Mark resolved calls resolveReviewThread with correct thread ID.
      - Thread marked resolved disappears from navigation cycle.
      - Pane with no threads: n/N is a no-op.

  # ─── Phase 7: Command Bar ────────────────────────────────────────────────────

  - id: 21
    title: Command bar and autocomplete (internal/ui/command_bar.go)
    status: pending
    depends_on: [14, 16]
    description: >
      Persistent input bar pinned to the bottom. Activated with / or :
      Features:
        - Fuzzy command autocomplete using sahilm/fuzzy as user types.
        - After command selected, activate PR completion:
            local session ID (a, b …), PR number (#42), or title fragment.
          PR list filtered from visible panels.
        - For :request, @ prefix triggers user autocomplete from repo collaborators
          (fetched via REST API, cached).
        - Tab accepts top suggestion; ↑/↓ navigates suggestion list.
        - History navigation with ↑/↓ when suggestion list not active.
        - Inline help hint showing command signature while typing.
        - Esc unfocuses without executing.
      Use Bubbles textinput component as the base.
    references:
      - "VISION.md § 3.5 Command Bar"
      - "VISION.md § 5 Command Bar Autocomplete Behavior"
      - "ARCHITECTURE.md § Technology Stack — Fuzzy Match: sahilm/fuzzy"
    testing: >
      - `:mer` → suggestions include `:merge`, filtered by fuzzy score.
      - Tab accepts top suggestion.
      - After command, PR list activates: local ID, #number, title fragment all match.
      - `:request` + `@` → collaborator list shown.
      - ↑/↓ cycles history when no suggestion list active.
      - Esc → input cleared, bar unfocused.
      - Help hint updates as command is typed.

  # ─── Phase 8: Interactive Commands ───────────────────────────────────────────

  - id: 22
    title: Implement all interactive commands
    status: pending
    depends_on: [21, 9]
    description: >
      Wire up all commands listed in VISION.md §3.6. Each command resolves the
      PR reference (session ID, #number, or title fragment) then calls the
      appropriate REST mutation (task 9) or local action:
        :open [#pr]              → open URL in default browser (open cmd)
        :diff [#pr]              → invoke delta pager with PR diff (task 23)
        :approve [#pr]           → REST: submit approval review
        :review [#pr]            → open inline compose view (body + submit)
        :request [#pr] @user...  → REST: request reviewers
        :ready [#pr]             → GraphQL mutation: mark ready for review
        :draft [#pr]             → GraphQL mutation: convert to draft
        :merge [#pr]             → REST: merge using repo's configured method
        :watch [#pr] …           → delegate to Watch Engine (task 27)
        :close [#pr]             → REST: close PR
        :reopen [#pr]            → REST: reopen PR
        :label [#pr] [label]     → REST: add/remove label
        :comment [#pr]           → open inline editor, post comment
        :dnd [duration]          → toggle DND mode (task 32)
        :wake                    → resume normal polling (task 13)
        :reload                  → force immediate poll
        :help                    → show help overlay (task 40)
        :quit / q                → exit
      All commands are immediately acted upon with no confirmation prompt.
    references:
      - "VISION.md § 3.6 Interactive Commands"
    testing: >
      - PR reference resolution: session ID, #number, and title fragment all
        resolve to the correct PR; unknown reference returns clear error.
      - Each command calls the expected mutation/action with correct arguments.
      - :reload triggers the force-poll channel.
      - :quit sends the Bubble Tea quit command.

  - id: 23
    title: Diff viewer integration (internal/diff)
    status: pending
    depends_on: [6]
    description: >
      Implement :diff by fetching the PR diff via GitHub REST API
      (Accept: application/vnd.github.diff) and piping it to the `delta`
      pager subprocess. Suspend the Bubble Tea TUI while delta is running,
      then resume on pager exit. Handle missing delta binary gracefully
      (fall back to raw diff or show install instructions).
    references:
      - "ARCHITECTURE.md § Technology Stack — Diff Viewer: delta"
      - "VISION.md § 3.6 :diff command"
    testing: >
      Inject executor interface for subprocess and HTTP client.
      - delta present → diff fetched, piped to delta, TUI suspended/resumed.
      - delta absent → fallback diff shown with install hint.
      - API error fetching diff → error surfaced to user.

  # ─── Phase 9: Audit Log ──────────────────────────────────────────────────────

  - id: 24
    title: Audit log (internal/audit)
    status: pending
    depends_on: [1]
    description: >
      Append an entry to ~/.local/share/argh/audit.log for every action argh
      takes: approve, merge, request, comment, label, watch execution, etc.
      Format: ISO-8601 timestamp, action type, repo, PR number, details.
      Create parent directory on first run. This is called from every mutation
      path (task 9) and every watch action execution (task 28).
    references:
      - "VISION.md § 3.6 — every action recorded in audit log"
      - "VISION.md § 9.5 Audit Log"
    testing: >
      Use a temp directory for log path in tests.
      - Entry appended with correct format (parseable ISO-8601 timestamp).
      - Multiple entries accumulate in order.
      - Log directory created if absent.
      - Concurrent writes do not interleave entries (use file locking or
        a single writer goroutine).

  # ─── Phase 10: Watch Engine ──────────────────────────────────────────────────

  - id: 25
    title: Watch trigger parser
    status: pending
    depends_on: [1]
    description: >
      Parse the trigger expression syntax from VISION.md §3.7:
        on:approved+ci         (AND: approved AND ci-pass)
        on:ci-pass,approved    (OR: ci-pass OR approved)
        on:24h-stale           (time-based)
      Supported trigger atoms:
        ci-pass, ci-fail, approved (optionally approved:N for N approvals),
        all-threads-resolved, ready-for-review, label-added:<name>,
        label-removed:<name>, <Nh>-stale.
      Return a structured AST that the Watch Engine can evaluate against
      a PR snapshot from the DB.
    references:
      - "VISION.md § 3.7 Watch — Trigger types, Trigger Syntax"
    testing: >
      Table-driven over all atom types, AND combinator, OR combinator,
      mixed AND+OR, invalid expressions.
      - Valid expressions parse to correct AST.
      - approved:N parses N correctly.
      - <Nh>-stale parses duration correctly.
      - label-added:<name> captures label name.
      - Invalid expression → clear parse error.
      AST evaluation tests (separate from parsing):
      - AND: both conditions true → fires; one false → does not fire.
      - OR: one condition true → fires; both false → does not fire.
      - Time-based: elapsed ≥ duration → fires; elapsed < duration → does not fire.

  - id: 26
    title: Watch action parser
    status: pending
    depends_on: [1]
    description: >
      Parse action expressions into typed action structs:
        merge[:method]        (squash, merge, rebase — defaults to repo setting)
        merge:squash
        ready                 (mark draft ready for review)
        request:@user         (request review)
        comment:<text>
        label:<name>
        notify                (desktop notification)
      Actions can be combined with `+`: e.g., `comment:text + notify`.
    references:
      - "VISION.md § 3.7 Watch — Action types"
    testing: >
      Table-driven over all action types and combined expressions.
      - Each valid action parses to correct struct with correct fields.
      - merge with no method → method field is empty (use repo default).
      - merge:squash → method=squash.
      - Combined `comment:text + notify` → two action structs returned.
      - Invalid action → clear parse error.

  - id: 27
    title: Watch management commands
    status: pending
    depends_on: [25, 26, 4, 21]
    description: >
      Implement :watch sub-commands wired through the command bar:
        :watch [#pr] <trigger> <action>  → parse trigger + action, write watch
                                           row to DB with status=waiting
        :watch list                      → show all active watches (also shown
                                           in Watches panel)
        :watch cancel [id]               → delete or mark cancelled in DB
      Watches persist across restarts in the watches table in SQLite (keyed by
      PR URL, mapped to ephemeral session IDs at runtime). SQLite is the single
      source of truth; no watches.yaml file is used.
    references:
      - "VISION.md § 3.7 Watch — Queue Management"
      - "ARCHITECTURE.md § High-Level Architecture — DB: SQLite"
    testing: >
      - :watch creates row in DB with status=waiting, correct trigger/action expr.
      - :watch list returns all non-cancelled watches.
      - :watch cancel [id] marks row cancelled; subsequent list excludes it.
      - Invalid trigger expression → error, no DB write.
      - Invalid action expression → error, no DB write.
      - Watch survives process restart (read back from DB on next startup).

  - id: 28
    title: Watch Engine goroutine (internal/watches)
    status: pending
    depends_on: [5, 25, 26, 9, 24]
    description: >
      Run an independent goroutine that subscribes to the DB event bus (task 5).
      On each PR_UPDATED event, load all watches for that PR and evaluate each
      trigger against the current PR state snapshot. If a trigger condition is
      met, execute the corresponding action(s) via the API client (task 9),
      update the watch row status to "fired" or "failed", append to audit log
      (task 24), and fire a WATCH_FIRED event on the bus. For time-based triggers
      (Nh-stale), maintain an internal timer per watch. Emit bus events on fire
      so the Watches panel can animate.
    references:
      - "VISION.md § 3.7 Watch — Watch Engine"
      - "ARCHITECTURE.md § High-Level Architecture — Watch Engine goroutine"
    testing: >
      - PR_UPDATED event with matching trigger → action executed, status=fired,
        audit entry written, WATCH_FIRED emitted.
      - PR_UPDATED with non-matching trigger → no action, status unchanged.
      - Action fails (API error) → status=failed, error in audit log.
      - Time-based trigger: inject clock; elapsed ≥ duration → fires.
      - Multiple watches for same PR → each evaluated independently.
      - Goroutine exits cleanly on shutdown signal.

  # ─── Phase 11: Notification System ──────────────────────────────────────────

