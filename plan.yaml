        - Row flash/highlight animation on the affected row in My PRs or
          Review Queue panel.
        - Badge counter update in panel headers.
        - Status bar update: "● #42 approved by @alice — 10s ago".
      Color coding: green (approved/passing), red (failing/changes requested),
