    testing: >
      - CI_CHANGED event → correct row gains flash style in View output.
      - REVIEW_CHANGED event → status bar text updated with correct PR and actor.
      - Badge counter increments on new PR, decrements on close/merge.
      - Each color code applied to correct event type.

  - id: 30
    title: macOS system notifications (internal/notify)
    status: pending
    depends_on: [3, 5]
    description: >
      Implement macOS Notification Center dispatch using gen2brain/beeep or
      deckarep/gosx-notifier (no external runtime dependency). Subscribe to
      DB events. Fire system notifications for:
        - CI: running → passing or failing
        - Review approval received
        - Review with changes requested
        - PR merged or closed
        - You are requested as a reviewer on a new PR
        - Watch action executed
      Respect the per-event config flags (notifications: section of config.yaml).
      Skip all system notifications when DND is active (task 32).
    references:
      - "VISION.md § 7 System Notifications"
      - "ARCHITECTURE.md § Technology Stack — Notifications"
    testing: >
      Inject the OS notification sender as an interface.
      - Each trigger event fires a notification with correct title/body.
      - Config flag false for event type → notification not sent.
      - DND active → no notifications sent regardless of config.
      - CI running→passing fires; CI running→running does not fire.

  - id: 31
    title: Notification deduplication and debouncing
    status: pending
    depends_on: [30]
    description: >
      Debounce notification dispatch with a 5-second window: if the same
      notification would fire again within 5s, drop the duplicate.
      Collapse CI flapping (pass→fail→pass within 60s) into a single
      notification. Track in-memory state per (pr_url, event_type) key.
    references:
      - "VISION.md § 7 Notification Deduplication"
    testing: >
      Inject clock interface.
      - Same event within 5s → second notification dropped.
      - Same event after 5s → notification sent.
      - CI pass→fail→pass within 60s → single notification.
      - CI pass→fail→pass after 60s reset → two notifications.

  - id: 32
    title: Do Not Disturb mode (VISION.md §9.6)
    status: pending
    depends_on: [3, 30, 14]
    description: >
      Implement DND as a runtime flag in the notifier. When active, suppress
      all system notifications (task 30) while in-app visuals continue normally.
      Toggle with :dnd command or D key. Timed DND: :dnd 2h sets a timer that
      re-enables notifications after the duration. Implement scheduled DND from
      config (do_not_disturb.schedule windows — same shape as sleep_schedule).
      Status bar shows "🔕 DND" when active.
    references:
      - "VISION.md § 9.6 Do Not Disturb Mode"
      - "VISION.md § 3.6 :dnd command"
    testing: >
      Inject clock interface.
      - :dnd toggles DND on; second :dnd toggles off.
      - :dnd 2h → DND active; after 2h elapses → DND deactivated.
      - Scheduled window active → DND on automatically.
      - Scheduled window ends → DND off automatically.
      - DND active → status bar shows "🔕 DND".
      - DND active → system notifications suppressed; in-app visuals unaffected.

