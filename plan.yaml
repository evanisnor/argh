  - id: 34
    title: Smart review assignment suggestions (VISION.md §9.2)
    status: pending
    depends_on: [9, 21]
    description: >
      When :request #pr is invoked without explicit @users, show a ranked
      suggestion list using up to three signals (all optional, degrade gracefully):
        1. git blame on local repo (if available) — who owns most changed lines.
        2. GitHub API: who reviewed similar PRs recently.
        3. GitHub API: CODEOWNERS rules for changed files.
      Combine signals into a ranked list, de-duplicate. User selects from the
      list before the request is sent.
    references:
      - "VISION.md § 9.2 Smart Review Assignment"
    testing: >
      Mock all three signals independently.
      - All three signals available → merged ranked list, no duplicates.
      - git blame unavailable → ranking uses remaining two signals.
      - All signals unavailable → empty suggestion list, command still works.
      - De-duplication: same login from multiple signals appears once.

  - id: 35
    title: Per-repo configuration (.argh.yaml)
    status: pending
    depends_on: [3]
    description: >
      When argh is run inside a git repo (or when a PR action targets a repo),
      look for .argh.yaml in the repo root (fetched via GitHub API, not local fs).
      If found, parse and apply overrides:
        - default_reviewers: list of logins
        - label_conventions: map of shorthand → full label name
        - merge_strategy: squash | merge | rebase
      Repo-level config takes precedence over global config for the relevant repo.
    references:
      - "VISION.md § 9.4 Per-Repo Configuration"
    testing: >
      Mock the GitHub API file fetch.
      - .argh.yaml present → overrides applied for that repo.
      - .argh.yaml absent → global config used unchanged.
      - .argh.yaml malformed → error logged, global config used as fallback.
      - Repo-level merge_strategy overrides global for merge command on that repo.

